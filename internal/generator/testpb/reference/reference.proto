syntax = "proto3";

package tests.reference;

option go_package = "github.com/protoc-contrib/protoc-gen-go-resource/internal/generator/testpb/reference";

import "google/api/resource.proto";
import "external/external.proto";
import "simple/simple.proto";

// Foo and Bar cross-reference each other; ParseBar on Foo and ParseFoo on
// Bar should resolve to the parsers of the referent resource.
message Foo {
  option (google.api.resource) = {
    type: "example.com/Foo"
    pattern: "foos/{foo}"
  };

  string name = 1;
  string bar = 2 [(google.api.resource_reference) = { type: "example.com/Bar" }];
}

message Bar {
  option (google.api.resource) = {
    type: "example.com/Bar"
    pattern: "bars/{bar}"
  };

  string name = 1;
  string foo = 2 [(google.api.resource_reference) = { type: "example.com/Foo" }];
}

// CrossPackage references a message-level resource defined in another proto
// package.
message CrossPackage {
  string thing_name = 1 [(google.api.resource_reference) = { type: "example.com/Thing" }];
}

// CrossPackageExternal references a resource declared at file scope in
// another package (google.api.resource_definition).
message CrossPackageExternal {
  string external_name = 1 [(google.api.resource_reference) = { type: "example.com/External" }];
}

// child_type references are not supported by the generator — without a
// pattern on the referring field we can't emit a parser. The field is
// retained here to verify the generator silently skips it.
message ChildTypeIgnored {
  string parent = 1 [(google.api.resource_reference) = { child_type: "example.com/Foo" }];
}

// Wildcard references are not bound to a specific type — also silently
// skipped.
message WildcardReference {
  string something = 1 [(google.api.resource_reference) = { type: "*" }];
}
