syntax = "proto3";

package tests.namefield;

option go_package = "github.com/protoc-contrib/protoc-gen-go-resource/internal/generator/testpb/namefield";

import "google/api/resource.proto";

// Person exercises a resource whose name lives in a field other than "name".
message Person {
  option (google.api.resource) = {
    type: "example.com/Person"
    pattern: "persons/{person}"
    name_field: "person_name"
  };

  string person_name = 1;
}
